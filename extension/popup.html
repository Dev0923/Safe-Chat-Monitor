<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Safety Monitor Configuration</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      width: 300px; 
      padding: 15px; 
      margin: 0;
    }
    .warning { 
      background-color: #fff3cd; 
      color: #856404; 
      padding: 10px; 
      border-radius: 4px; 
      margin-bottom: 15px; 
      font-size: 13px; 
      border: 1px solid #ffeeba; 
    }
    label {
      font-size: 13px;
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }
    input, button { 
      width: 100%; 
      padding: 8px; 
      margin-bottom: 12px; 
      box-sizing: border-box; 
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button { 
      background-color: #007bff; 
      color: white; 
      border: none; 
      cursor: pointer; 
      font-weight: bold;
    }
    button:hover { 
      background-color: #0056b3; 
    }
    #logoutBtn {
      background-color: #dc3545;
    }
    #logoutBtn:hover {
      background-color: #c82333;
    }
    #status { 
      color: #155724; 
      background-color: #d4edda;
      border: 1px solid #c3e6cb;
      padding: 8px;
      border-radius: 4px;
      font-size: 13px; 
      display: none; 
      margin-bottom: 15px;
    }
    #login-section, #active-section { 
      display: none; 
    }
    p {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h2 style="margin-top: 0; font-size: 18px;">Safety Monitor</h2>
  
  <div class="warning">
    <strong>Notice:</strong> Browsing activity is being shared with your parent dashboard for safety monitoring.
  </div>

  <div id="status">Saved successfully!</div>

  <div id="login-section">
    <label for="childId">Child ID:</label>
    <input type="text" id="childId" placeholder="Enter Child ID from login">
    
    <label for="authToken">Auth Token (Optional):</label>
    <input type="password" id="authToken" placeholder="Enter auth token">
    
    <button id="saveBtn">Save Settings</button>
  </div>

  <div id="active-section">
    <p>Currently monitoring for ID:<br> <strong id="display-childId"></strong></p>
    <button id="logoutBtn">Clear Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
